<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | X+M² arquitectos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a1a;
            --bg-texture: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Textura de fondo sutil */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.02) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            align-items: center;
        }

        /* Columna izquierda - Branding */
        .brand-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .logo-container {
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .logo sup {
            font-size: 0.4em;
            vertical-align: super;
            margin-left: 0.1em;
            font-weight: 400;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: lowercase;
            color: var(--text-secondary);
            opacity: 0;
            animation: fadeIn 1s ease 0.3s forwards;
        }

        .contact-info-vertical {
            position: absolute;
            left: -3rem;
            top: 50%;
            transform: rotate(-90deg) translateX(-50%);
            transform-origin: left center;
            display: flex;
            gap: 2rem;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0;
            animation: fadeIn 1s ease 0.6s forwards;
        }

        .contact-info-vertical a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }

        .contact-info-vertical a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text-primary);
            transition: width 0.3s ease;
        }

        .contact-info-vertical a:hover {
            color: var(--text-primary);
        }

        .contact-info-vertical a:hover::after {
            width: 100%;
        }

        /* Columna derecha - Formulario y detalles */
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .name-block {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease 0.2s forwards;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 400;
            letter-spacing: 0.05em;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-variant: small-caps;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s ease 0.4s forwards;
        }

        .form-group {
            position: relative;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group label {
            position: absolute;
            left: 0;
            top: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 300;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-bottom-color: var(--text-primary);
        }

        .form-group input:focus+label,
        .form-group input:not(:placeholder-shown)+label,
        .form-group textarea:focus+label,
        .form-group textarea:not(:placeholder-shown)+label {
            top: -0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .submit-btn {
            align-self: flex-start;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 1rem 3rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--text-primary);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .submit-btn:hover {
            color: var(--bg-dark);
            border-color: var(--text-primary);
        }

        .submit-btn:hover::before {
            left: 0;
        }

        .footer-info {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            opacity: 0;
            animation: fadeIn 1s ease 0.6s forwards;
        }

        .website {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .website:hover {
            color: var(--text-primary);
        }

        .social {
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        /* Animaciones */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
                gap: 3rem;
                padding: 2rem;
            }

            .contact-info-vertical {
                position: static;
                transform: none;
                flex-direction: column;
                gap: 1rem;
                margin-top: 2rem;
            }

            .brand-section {
                align-items: center;
                text-align: center;
            }

            .content-section {
                align-items: center;
                text-align: center;
            }

            .submit-btn {
                align-self: center;
            }

            .footer-info {
                align-items: center;
            }
        }

        /* Cursor personalizado sutil */
        @media (pointer: fine) {
            .submit-btn:hover {
                cursor: pointer;
            }
        }

        /* Efecto de líneas arquitectónicas */
        .architectural-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
        }

        .line {
            position: absolute;
            background: white;
        }

        .line-h {
            width: 100%;
            height: 1px;
            top: 33%;
        }

        .line-v {
            width: 1px;
            height: 100%;
            left: 50%;
        }
    </style>
</head>

<body>
    <!-- Líneas arquitectónicas sutiles de fondo -->
    <div class="architectural-lines">
        <div class="line line-h"></div>
        <div class="line line-v"></div>
    </div>

    <div class="container">
        <!-- Sección izquierda: Branding -->
        <section class="brand-section">
            <div class="logo-container">
                <div class="logo">X+M<sup>2</sup></div>
                <div class="tagline">arquitectos | studio + taller</div>
            </div>

            <div class="contact-info-vertical">
                <a href="mailto:xmasm2arquitectos@gmail.com">xmasm2arquitectos@gmail.com</a>
                <span>+56 9 3720 2177</span>
            </div>
        </section>

        <!-- Sección derecha: Formulario y contacto -->
        <section class="content-section">
            <div class="name-block">
                <h1 class="name">Ricardo Andrés<br>Manríquez Menares</h1>
                <p class="title">Socio Fundador y Director de Proyectos</p>
            </div>

            <form class="contact-form" id="contactForm">
                <!-- Web3Forms: reemplaza YOUR_ACCESS_KEY con tu clave de web3forms.com -->
                <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY">
                <input type="hidden" name="subject" value="Nuevo contacto - X+M² arquitectos">
                <input type="hidden" name="from_name" value="Web X+M² arquitectos">
                <!-- Honeypot anti-spam -->
                <input type="checkbox" name="botcheck" style="display:none">

                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder=" " required>
                    <label for="name">Nombre</label>
                </div>

                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>

                <div class="form-group">
                    <input type="text" id="subject" name="subject_msg" placeholder=" ">
                    <label for="subject">Asunto</label>
                </div>

                <div class="form-group">
                    <textarea id="message" name="message" placeholder=" " required></textarea>
                    <label for="message">Mensaje</label>
                </div>

                <button type="submit" class="submit-btn">Enviar</button>
            </form>

            <div class="footer-info">
                <a href="https://www.xmasm2arquitectos.cl" class="website" target="_blank">www.xmasm2arquitectos.cl</a>
                <span class="social">@xmasm2arquitectos</span>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contactForm');

            const inputs = document.querySelectorAll('input:not([type=hidden]):not([type=checkbox]), textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.style.transform = 'translateX(5px)';
                    setTimeout(() => {
                        input.parentElement.style.transform = 'translateX(0)';
                    }, 300);
                });
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const btn = form.querySelector('.submit-btn');
                const originalText = btn.textContent;

                btn.textContent = 'Enviando...';
                btn.style.opacity = '0.7';
                btn.disabled = true;

                try {
                    const formData = new FormData(form);

                    const userSubject = formData.get('subject_msg');
                    if (userSubject) {
                        formData.set('subject', `Contacto X+M² - ${userSubject}`);
                    }
                    formData.delete('subject_msg');

                    const response = await fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();

                    if (data.success) {
                        btn.textContent = '✓ Mensaje Enviado';
                        btn.style.background = 'var(--text-primary)';
                        btn.style.color = 'var(--bg-dark)';
                        btn.style.opacity = '1';
                        form.reset();

                        setTimeout(() => {
                            btn.textContent = originalText;
                            btn.style.background = '';
                            btn.style.color = '';
                            btn.disabled = false;
                        }, 3000);
                    } else {
                        throw new Error(data.message || 'Error al enviar');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    btn.textContent = '✗ Error — Intenta de nuevo';
                    btn.style.opacity = '1';
                    btn.style.borderColor = 'rgba(255,100,100,0.6)';
                    btn.style.color = 'rgba(255,150,150,0.9)';

                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.borderColor = '';
                        btn.style.color = '';
                        btn.disabled = false;
                    }, 3000);
                }
            });

            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 10;
                const y = (e.clientY / window.innerHeight - 0.5) * 10;
                const logo = document.querySelector('.logo');
                logo.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
            });
        });
    </script>
</body>

</html>
